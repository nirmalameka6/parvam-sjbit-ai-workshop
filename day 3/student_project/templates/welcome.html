{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7 col-md-9">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h2 class="card-title mb-3">Welcome, {{ user['name'] }}!</h2>
        <p class="text-muted">You have successfully logged in.</p>
        <div class="row gy-2">
          <div class="col-sm-6">
            <div class="border rounded p-3 bg-white">
              <h6 class="mb-1">Email</h6>
              <p class="mb-0">{{ user['email'] }}</p>
            </div>
          </div>
          <div class="col-sm-6">
            <div class="border rounded p-3 bg-white">
              <h6 class="mb-1">Mobile</h6>
              <p class="mb-0">{{ user['mobile'] or 'Not provided' }}</p>
            </div>
          </div>
          <div class="col-sm-6">
            <div class="border rounded p-3 bg-white">
              <h6 class="mb-1">Gender</h6>
              <p class="mb-0">{{ user['gender'] or 'Not specified' }}</p>
            </div>
          </div>
          <div class="col-sm-6">
            <div class="border rounded p-3 bg-white">
              <h6 class="mb-1">User ID</h6>
              <p class="mb-0">{{ user['id'] }}</p>
            </div>
          </div>
        </div>
        <div class="mt-4">
          <a href="{{ url_for('logout') }}" class="btn btn-outline-secondary">Logout</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
